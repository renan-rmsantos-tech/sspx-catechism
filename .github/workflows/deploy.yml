name: Deploy

# Build + deploy manual (auto-deploy on push disabled).
# Builds happen ON the VPS (no external registry). Requires repo secrets:
#   SSH_HOST, SSH_USER, SSH_KEY (private key), DEPLOY_PATH (e.g. /opt/catechism)
#
# Re-enable auto-deploy: add `push: branches: [main]` under `on:`.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Backend tests
        working-directory: backend
        run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx vitest run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f

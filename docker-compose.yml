# Production stack for the SSPX Catechism app on a single Hetzner VPS.
# Services: Postgres (internal only), Go API, and Caddy (edge: TLS + SPA + proxy).
# Bring up with:  docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports published — Postgres is reachable only on the internal network.

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_ENV: production
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # distroless image has no shell/wget; the binary probes /api/health itself.
      test: ["CMD", "/api", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports published — reached only through Caddy.

  caddy:
    build:
      context: .
      dockerfile: infra/Caddy.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:

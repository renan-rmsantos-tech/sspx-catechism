version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: db/queries
    gen:
      go:
        package: sqlcgen
        out: internal/db/sqlcgen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
